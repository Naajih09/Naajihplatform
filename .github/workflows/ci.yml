name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm prisma generate

      - name: Build packages (needed for check-types)
        run: pnpm --filter @repo/ui build

      - run: pnpm check-types

      - run: pnpm lint

  test:
    name: Test (API)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: naajih_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Setup database and run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/naajih_test?schema=public
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/naajih_test?schema=public
          JWT_SECRET: ci-test-secret
          PAYSTACK_SECRET_KEY: sk_test_ci
          PAYSTACK_WEBHOOK_SECRET: ci-test-wh-secret
          OPAY_SECRET_KEY: OPAYPRV_ci
          OPAY_MERCHANT_ID: 281826030662239
          OPAY_PUB_KEY: OPAYPUB_ci
          FRONTEND_URL: http://localhost:3001
          BACKEND_URL: http://localhost:3000
        run: |
          pnpm prisma generate
          pnpm prisma db push --skip-generate
          pnpm test -- --passWithNoTests
